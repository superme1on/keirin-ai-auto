name: daily-keirin-predict

on:
  workflow_dispatch:
  schedule:
    - cron: "45 6 * * *"
      timezone: "Asia/Tokyo"

permissions:
  contents: write

concurrency:
  group: daily-keirin-predict
  cancel-in-progress: false

jobs:
  predict:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ingest external data if configured
        env:
          KEIRIN_HISTORY_CSV_URL: ${{ secrets.KEIRIN_HISTORY_CSV_URL }}
          KEIRIN_TODAY_CSV_URL: ${{ secrets.KEIRIN_TODAY_CSV_URL }}
        run: |
          python src/ingest.py

      - name: Generate sample data if missing
        run: |
          python src/make_sample_data.py --if-missing

      - name: Train from latest history
        run: |
          python src/train.py

      - name: Predict
        run: |
          python src/predict.py

      - name: Upload output artifact
        uses: actions/upload-artifact@v7
        with:
          name: keirin-predictions
          path: outputs/
          retention-days: 30

      - name: Commit outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add outputs models || true
          git diff --staged --quiet || git commit -m "Update keirin predictions"
          git push
