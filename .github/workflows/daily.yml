name: daily-keirin-predict

on:
  workflow_dispatch:
  schedule:
    # 06:45 JST
    - cron: "45 21 * * *"

permissions:
  contents: write

concurrency:
  group: daily-keirin-predict
  cancel-in-progress: false

jobs:
  predict:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ingest external data if configured
        env:
          KEIRIN_HISTORY_CSV_URL: ${{ secrets.KEIRIN_HISTORY_CSV_URL }}
          KEIRIN_TODAY_CSV_URL: ${{ secrets.KEIRIN_TODAY_CSV_URL }}
        run: |
          python src/ingest.py

      - name: Fetch today entries if no external today data is configured
        if: ${{ secrets.KEIRIN_TODAY_CSV_URL == '' }}
        run: |
          python src/fetch_today_entries.py

      - name: Build fallback model only if missing
        if: ${{ secrets.KEIRIN_HISTORY_CSV_URL == '' }}
        run: |
          if [ ! -f models/win_model.joblib ]; then
            python src/build_history.py --months-back 1 --max-races 300 --workers 4
            python src/train.py
            python src/update_growth_log.py --kind train
          fi

      - name: Predict
        run: |
          python src/predict.py

      - name: Upload output artifact
        uses: actions/upload-artifact@v7
        with:
          name: keirin-predictions
          path: outputs/
          retention-days: 30

      - name: Commit outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add outputs models || true
          git diff --staged --quiet || git commit -m "Update keirin predictions"
          git pull --rebase
          git push
