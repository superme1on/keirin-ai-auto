name: settle-keirin-results

on:
  workflow_dispatch:
  schedule:
    # 23:30 JST
    - cron: "30 14 * * *"

permissions:
  contents: write

concurrency:
  group: settle-keirin-results
  cancel-in-progress: false

jobs:
  settle:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch today entries for result URLs
        run: |
          python src/fetch_today_entries.py

      - name: Settle predictions
        run: |
          python src/settle_results.py

      - name: Append settlement growth log
        run: |
          python src/update_growth_log.py --kind settle

      - name: Settle all shadow predictions
        run: |
          python src/settle_shadow.py

      - name: Update trial report
        run: |
          python src/report_growth.py --days 31 --start-date 2026-07-01

      - name: Upload settlement artifact
        uses: actions/upload-artifact@v4
        with:
          name: keirin-settlement
          path: |
            outputs/purchase_plan.csv
            outputs/settled_bets.csv
            outputs/settlement_summary.csv
            outputs/japanese_report.md
            outputs/growth_log.csv
            outputs/trial_report.md
            outputs/shadow_race_results.csv
            outputs/shadow_settled_bets.csv
            outputs/shadow_daily_summary.csv
            outputs/shadow_bet_type_summary.csv
            outputs/shadow_overall.json
            outputs/shadow_report.md
            models/
          retention-days: 30

      - name: Commit settlement
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add models outputs/purchase_plan.csv outputs/settled_bets.csv outputs/settlement_summary.csv outputs/japanese_report.md outputs/growth_log.csv outputs/trial_report.md outputs/shadow_race_results.csv outputs/shadow_settled_bets.csv outputs/shadow_daily_summary.csv outputs/shadow_bet_type_summary.csv outputs/shadow_overall.json outputs/shadow_report.md || true
          git diff --staged --quiet || git commit -m "Settle keirin predictions"
          git pull --rebase
          git push
