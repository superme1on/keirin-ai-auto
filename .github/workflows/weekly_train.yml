name: weekly-keirin-train

on:
  workflow_dispatch:
  schedule:
    - cron: "30 5 * * 1"
      timezone: "Asia/Tokyo"

permissions:
  contents: write

concurrency:
  group: weekly-keirin-train
  cancel-in-progress: false

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ingest external data if configured
        env:
          KEIRIN_HISTORY_CSV_URL: ${{ secrets.KEIRIN_HISTORY_CSV_URL }}
          KEIRIN_TODAY_CSV_URL: ${{ secrets.KEIRIN_TODAY_CSV_URL }}
        run: |
          python src/ingest.py

      - name: Build real history if no external history is configured
        if: ${{ secrets.KEIRIN_HISTORY_CSV_URL == '' }}
        run: |
          python src/build_history.py --months-back 1 --max-races 600

      - name: Train
        run: |
          python src/train.py

      - name: Upload model artifact
        uses: actions/upload-artifact@v7
        with:
          name: keirin-model
          path: |
            models/
            outputs/backtest_summary.csv
            outputs/backtest_summary.json
            outputs/latest_backtest.csv
          retention-days: 30

      - name: Commit model and backtest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add models outputs/backtest_summary.csv outputs/backtest_summary.json outputs/latest_backtest.csv || true
          git diff --staged --quiet || git commit -m "Update keirin model and backtest"
          git push
