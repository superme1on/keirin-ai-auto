name: weekly-keirin-train

on:
  workflow_dispatch:
  schedule:
    # Monday 05:30 JST
    - cron: "30 20 * * 0"

permissions:
  contents: write

concurrency:
  group: weekly-keirin-train
  cancel-in-progress: false

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ingest external data if configured
        env:
          KEIRIN_HISTORY_CSV_URL: ${{ secrets.KEIRIN_HISTORY_CSV_URL }}
          KEIRIN_TODAY_CSV_URL: ${{ secrets.KEIRIN_TODAY_CSV_URL }}
        run: |
          python src/ingest.py

      - name: Build real history if no external history is configured
        if: ${{ secrets.KEIRIN_HISTORY_CSV_URL == '' }}
        env:
          HISTORY_MONTHS_BACK: 24
          HISTORY_MAX_RACES: 10000
          HISTORY_WORKERS: 8
        run: |
          python src/build_history.py --months-back "$HISTORY_MONTHS_BACK" --max-races "$HISTORY_MAX_RACES" --workers "$HISTORY_WORKERS" --sleep-sec 0 --progress-every 250

      - name: Train
        run: |
          python src/train.py

      - name: Append training growth log
        run: |
          python src/update_growth_log.py --kind train

      - name: Run multi bet type backtest
        run: |
          python src/multi_bet_backtest.py --min-train-dates 30 --retrain-every-days 7 --top-k 5 --min-prob 0.02 --min-expected-profit 100 --max-odds 300 --max-bets-per-race-type 2 --max-bets-per-day-type 40 --base-stake 100 --max-stake 500
          python src/update_growth_log.py --kind multi_bet_backtest

      - name: Upload model artifact
        uses: actions/upload-artifact@v7
        with:
          name: keirin-model
          path: |
            models/
            outputs/backtest_summary.csv
            outputs/backtest_summary.json
            outputs/latest_backtest.csv
            outputs/growth_log.csv
            outputs/multi_bet_backtest_bets.csv
            outputs/multi_bet_backtest_summary.csv
            outputs/multi_bet_backtest_overall.json
            outputs/multi_bet_backtest_report.md
            outputs/multi_bet_period_summary.csv
            outputs/multi_bet_threshold_sweep.csv
            outputs/multi_bet_recommended_conditions_periods.csv
          retention-days: 30

      - name: Commit model and backtest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add models outputs/backtest_summary.csv outputs/backtest_summary.json outputs/latest_backtest.csv outputs/growth_log.csv outputs/multi_bet_backtest_bets.csv outputs/multi_bet_backtest_summary.csv outputs/multi_bet_backtest_overall.json outputs/multi_bet_backtest_report.md outputs/multi_bet_period_summary.csv outputs/multi_bet_threshold_sweep.csv outputs/multi_bet_recommended_conditions_periods.csv || true
          git diff --staged --quiet || git commit -m "Update keirin model and backtest"
          git pull --rebase
          git push
